version: "3.9"

services:
  api:
    build:
      context: ./mef_engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MEF_AUTH_ENABLED=0
      - MEF_API_KEY=change-me-in-production
    volumes:
      - ./logs:/app/logs
      - ./output_api:/app/output_api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
